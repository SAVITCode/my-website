<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVITCode – Build Better Trading Systems | Pine Script & Automation</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="description" content="SAVITCode helps traders build better trading systems through Pine Script, automation, practical tools, and systematic trading education.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Background with overlay */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('BG.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(100%);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg,
                rgba(0, 0, 0, 0.88) 0%,
                rgba(0, 0, 0, 0.93) 50%,
                rgba(0, 0, 0, 0.97) 100%);
            backdrop-filter: blur(1px);
        }

        /* Animated particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            min-height: 1vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.4rem;
            position: relative;
            z-index: 1;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 0.1rem;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            max-width: 300px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.15));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        /* Content Section */
        .content {
            text-align: center;
            max-width: 800px;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff, #d4d4d4, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: #b3b3b3;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
        }

        .description {
            font-size: 1rem;
            color: #8a8a8a;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
            max-width: 600px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #e5e5e5;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border-left: 3px solid #ffffff;
            font-family: 'JetBrains Mono', monospace;
        }

        .feature-icon {
            color: #ffffff;
            font-size: 1rem;
            min-width: 16px;
        }

        /* Social Links */
        .social-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            align-items: stretch;
            gap: 0.75rem;
            width: 100%;
            max-width: 500px;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 0.25rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            min-height: 50px;
            width: 100%;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        .social-link i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .social-link:hover i {
            transform: scale(1.2);
        }

        /* All platforms share the same monochrome hover now (matches logo) */
        .youtube:hover,
        .facebook:hover,
        .gumroad:hover,
        .coffee:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.25);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: #666666;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 1s ease-out 0.9s both;
            position: relative;
            z-index: 1;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .title {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .description {
                font-size: 0.9rem;
            }

            .features {
                text-align: center;
            }

            .feature-item {
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .social-links {
                gap: 0.5rem;
            }

            .social-link {
                padding: 0.75rem 0.25rem;
                font-size: 0.85rem;
            }

            .logo {
                max-width: 250px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
                margin-bottom: 0.75rem;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 1.25rem;
            }

            .features {
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }

            .feature-item {
                font-size: 0.75rem;
                padding: 0.6rem 0.5rem;
                flex-direction: row;
                text-align: left;
                gap: 0.4rem;
            }

            .feature-icon {
                font-size: 0.9rem;
                min-width: 14px;
            }

            .social-links {
                gap: 0.4rem;
            }

            .social-link {
                padding: 0.6rem 0.15rem;
                min-height: 46px;
                font-size: 0.8rem;
            }

            .logo {
                max-width: 160px;
            }

            .container {
                padding: 0.75rem;
            }
        }

        /* Glitch effect for logo on hover */
        .logo-section:hover .logo {
            animation: glitch 0.3s;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="SICON.png" alt="SavitCode Logo" class="logo">
        </div>

        <!-- Content Section -->
        <div class="content">
            <h1 class="title">SAVITCode</h1>
            <p class="subtitle">Build Better Trading Systems</p>

            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-chart-line feature-icon"></i>
                    <span>Pine Script Indicators & Smart Alerts</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-wrench feature-icon"></i>
                    <span>Trading Tools, Automation & Workflows</span>
                </div>
            </div>
        </div>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://youtube.com/@savitcode" class="social-link youtube" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://facebook.com/savitcode" class="social-link facebook" target="_blank" rel="noopener">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://gumroad.com/savitcode" class="social-link gumroad" target="_blank" rel="noopener">
                <i class="fas fa-shopping-bag"></i>
            </a>
            <a href="https://savitcode.com/about" class="social-link coffee" target="_blank" rel="noopener">
                <i class="fas fa-comments"></i>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2025 SAVITCode.com</p>
        <p style="font-size: 0.8rem; color: #666666; margin-top: 0.5rem;"> Educational purposes only.</p>
        <p style="font-size: 0.8rem; color: #666666; margin-top: 0.5rem;"> Not financial advice.</p>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 5) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createParticles();

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        });

        document.addEventListener('mousemove', function(e) {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;

            const particles = document.querySelectorAll('.particle');
            particles.forEach((particle, index) => {
                const speed = (index % 5 + 1) * 0.5;
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                particle.style.transform += ` translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
